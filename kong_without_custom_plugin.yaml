_format_version: "3.0"
_info:
  select_tags:
  - kongversation
_konnect:
  control_plane_name: tcsai
services:
- name: kongversation-service
  url: https://httpbin.konghq.com
  routes:
  - name: kongversation-route
    paths:
    - /kongversation
    plugins:
    - name: ai-proxy
      instance_name: "ai-proxy-kongversation"
      enabled: true
      config:
        balancer:
          algorithm: round-robin
          connect_timeout: 60000
          failover_criteria:
            - error
            - timeout
          hash_on_header: X-Kong-LLM-Request-ID
          latency_strategy: tpot
          read_timeout: 60000
          retries: 5
          slots: 10000
          tokens_count_strategy: total-tokens
          write_timeout: 60000
        embeddings: null
        genai_category: text/generation
        llm_format: openai
        max_request_body_size: 8192
        model_name_header: true
        response_streaming: allow
        targets:
          - auth:
              allow_override: false
              aws_secret_access_key: null
              azure_client_id: null
              azure_client_secret: null
              azure_tenant_id: null
              azure_use_managed_identity: false
              header_name: api-key
              header_value: '{vault://azure-openai/apikey}'
              param_location: null
              param_name: null
              param_value: null
            description: null
            logging:
              log_payloads: false
              log_statistics: true
            model:
              name: null
              options:
                anthropic_version: null
                azure_api_version: 2024-05-01-preview
                azure_deployment_id: TCSOAI_GPT4o_2024-08-01
                azure_instance: btgazureopenai
              provider: azure
            route_type: llm/v1/chat
            weight: 100
        vectordb: null
      enabled: true
      id: 710bc3cc-cca7-472d-ab55-3b1fb1b1dd31
      name: ai-proxy-advanced
      protocols:
        - grpc
        - grpcs
        - http
        - https
    - name: ai-prompt-decorator
      instance_name: ai-prompt-decorator-kongversation
      enabled: true
      config:
        prompts:
          prepend:
          - role: system
            content: "You will always respond in the English (India) language."
    - name: key-auth
      instance_name: key-auth-kongversation
      enabled: true
   
consumers:
  - username: kongversation-app-a                              
    keyauth_credentials:
      - key: kongversation-app-a-123                      
  - username: kongversation-app-b                          
    keyauth_credentials:
      - key: kongversation-app-b-123               
 
  